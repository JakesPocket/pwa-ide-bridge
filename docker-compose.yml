version: '3.8'

services:
  pocketcode-frontend:
    image: node:20-alpine
    container_name: pocketcode-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    ports:
      - "5174:5174"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - VITE_SERVER_URL=${VITE_SERVER_URL:-http://host.docker.internal:3000}
    restart: unless-stopped

# The backend runs from the PocketCode-Server repository as a separate service.
# Override VITE_SERVER_URL if your backend is exposed on a Codespace URL.
